  responses:
    APIKeyInvalid:
      description: API Key or Workspace ID is invalid. User is unauthorised.
      content:
        application/json:
          schema:
            properties:
              _message:
                example: Invalid API details
                type: string
              status:
                example: error
                type: string
            type: object
            required:
            - _message
            - status
    ProfileMergedSuccessfully:
      description: Profiles merged successfully and the source profile is deleted
      content:
        application/json:
          schema:
            properties:
              _message:
                example: 1 Record(s) updated and 1 Records(s) deleted
                type: string
              status:
                example: ok
                type: string
            type: object
            required:
            - _message
            - status
    ProfileChannelUpdated:
      description: Profile updated successfully
      content:
