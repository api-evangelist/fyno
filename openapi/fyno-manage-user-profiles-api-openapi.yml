                type: string
              status:
                example: error
                type: string
            type: object
            required:
            - _message
            - status
    DistinctIDAlreadyExists:
      description: Distinct ID already exists
      content:
        application/json:
          schema:
            properties:
              _message:
                example: Distinct ID 'distinct_id' already exists in the 'version' version of your workspace
                type: string
              status:
                example: error
                type: string
            type: object
            required:
            - _message
            - status
    ProfileFetched:
      description: Profile fetched successfully
      content:
        application/json:
          schema:
            properties:
              channel:
                $ref: '#/components/schemas/inline_response_200_channel'
              country_code:
                description: The country code of the user. This value is automatically determined based on the number provided in the SMS channel of the profile. For a list of possible values, please <a href="https://content.fyno.io/docs/files/country_code.json" target="_blank">click here</a>.
                example: IN
                type: string
              created_at:
                description: The timestamp when the profile was created in ISO Date Time Format.
                example: '2023-04-21T06:34:01.386Z'
                type: string
              distinct_id:
                description: The distinct ID used to identify the user.
                example: XXXXXXXX
                type: string
              id_list:
                description: Other profile IDs previously linked to this profile.
                items:
                  example: 6442XXXXXXXXXXXXXXXXc684
                type: array
              name:
                description: The full name of the user.
                example: John Doe
                type: string
              profile_id:
                description: Unique profile ID within Fyno.
                example: 6442XXXXXXXXXXXXXXXXc685
                type: string
              status:
                description: The status of the user. If `1`, the user is active and should receive notifications. If `0`, the user in inactive and should not receive notifications.
                enum:
                - 1
                - 0
                example: 1
                type: integer
              timezone:
                description: The timezone of the user. For a list of possible values, please <a href="https://content.fyno.io/docs/files/timezones.json" target="_blank">click here</a>.
                example: Asia/Kolkata
                type: string
              timezone_offset:
                description: The timezone offset of the user. The value is automatically determined based on the timezone provided for the user in the profile.
                example: +05:30
                type: string
              updated_at:
                description: The timestamp when the profile was last updated in ISO Date Time Format.
                example: '2023-04-21T08:42:30.235Z'
                type: string
              version:
                description: The version where the user profile is available.
                enum:
                - live
                - test
                example: test
                type: string
            type: object
            required:
            - distinct_id
            - country_code
            - timezone
            - timezone_offset
            - created_at
            - updated_at
            - channel
            - properties
            - status
            - id_list
            - profile_id
            - version
            - channel_raw
    DistinctIDDoesNotExist3:
      description: Distinct ID does not exist
