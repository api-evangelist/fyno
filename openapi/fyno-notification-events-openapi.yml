      description:
        (Optional) You can enable callback for an event by specifying the `callback`
        attribute in the payload of the event. By enabling callback, you will be able
        to receive delivery status of the events onto your webhook URL specified in the
        "Allowlist URL" section of the application. See [Configuring Allowlist URL/SQS to receive Delivery Report](../../configuring-allowlist-url-sqs-to-receive-delivery-report) for more details.
      properties:
        custom_id:
          description:
            Use this parameter to send an ID that you would want to receive
            as a response (for reconciliation) in your delivery callback.
          example: ID001
          type: string
        custom1:
          description:
            "(Optional) Use this parameter to send another ID that you want
            to receive as a response (for reconciliation) in your delivery callback."
          example: EV001
          type: string
        custom2:
          description:
            "(Optional) Use this parameter to send yet another ID that you
            want to receive as a response (for reconciliation) in your delivery callback."
          example: P001
          type: string
        custom3:
          description:
            "(Optional) Use this parameter to send yet another ID that you
            want to receive as a response (for reconciliation) in your delivery callback."
          example: C001
          type: string
        enable:
          description:
            "(Optional) Set `true` to enable delivery callback or `false` to
            disable delivery callback. The default value is `true` if `custom_id` is specified."
          enum:
            - true
            - false
          example: true
          type: boolean
        allowlist_url:
          description: "(Optional) Allowlist URL name where you want to receive delivery reports. Can be array of Allowlist URL names too if you want the delivery reports in multiple URLs. If `allowlist_url` is not specified, but callback object has `enable=true` and `custom_id` is specified, then the delivery reports will be sent to the default endpoint set to receive delivery reports in the [Configuring Allowlist URL](../../configuring-allowlist-url-sqs-to-receive-delivery-report) settings."
          example: ["WebhookURL1", "WebhookURL2"]
          oneOf:
            - type: string
            - type: array
              items:
                type: string
      required:
        - custom_id
      type: object
