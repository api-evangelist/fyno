            Your batch payload must specify at least *`distinct_id`* or *`to`*
            while firing a notification event.<br/><br/>If the payload contains&#58;<br/><br/>-
            <b>Option 1&#58;</b> ONLY *`to`* (and no *`distinct_id`*) - the event uses
            all destination values from the *`to`* object (as it is).<br/><br/>- <b>Option
            2&#58;</b> ONLY *`distinct_id`* (and no *`to`*) - the event uses all destination
            values (such as SMS, WhatsApp, Email, Push, Voice and so on) from the user's
            profile and sends the notification.<br/><br/>- <b>Option 3&#58;</b> BOTH *`distinct_id`*
            and *`to`* - the `to` and `distinct_id` channel data merges (`to` object take
            precedences) and sends the notification. The sent notification is tagged to
            the ID specified, which can be then used to search the logs by using `distinct_id`.
          items:
            oneOf:
              - properties:
                  callback:
                    "$ref": "#/components/schemas/callback"
                  data:
                    "$ref": "#/components/schemas/data"
                  to:
                    "$ref": "#/components/schemas/to"
