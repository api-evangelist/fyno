    user_property_bulk:
      properties:
        batch:
          description: "Enter an array of objects with `distinct_id` and `action` to perform on the user properties"
          items:
            type: object
            properties:
              distinct_id:
                "$ref": "#/components/schemas/distinct_id"
              action:
                type: object
                properties:
                  "$set":
                    "$ref": "#/components/schemas/set_user_property_fields"
                  "$once":
                    "$ref": "#/components/schemas/set_user_property_once_fields"
                  "$add":
                    "$ref": "#/components/schemas/increment_user_property_fields"
                  "$append":
                    "$ref": "#/components/schemas/append_to_user_property_fields"
                  "$remove":
                    "$ref": "#/components/schemas/remove_from_user_property_list_fields"
                  "$unset":
                    "$ref": "#/components/schemas/unset_user_property_fields"
            example:
              distinct_id: "XXXXX"
              action:
                $set:
                  property_1: "some text"
                  property_2: 123
                  property_3: 45.67
                $once:
                  property_4: true
                  property_5: ["iPhone 16 Pro", "iPad 32 GB"]
                  property_6: "2020-10-01T18:30:00.000Z"
                $add:
                  property_7: 10.23
                  property_8: -11.9
                  property_9: 223
                $append:
                  property_10: "#12345"
                  property_11: 2030
                  property_12: "2022-11-11T10:30:00+02:00"
                $remove:
                  property_13: "2023-11-10"
                  property_14: "ABC1234"
                  property_15: 4010
                $unset: ["property_0", "old_property1"]
            required:
              - distinct_id
              - action
          type: array
      required:
        - batch
    to:
      properties:
        discord:
          description: Enter the discord ID of the user.
          example: 101XXXXXXXXXX7XXXXX
          type: string
        email:
          description: Enter the email address of the user.
          example: abcde@fghi.com
          type: string
        inapp:
          description: Enter the distinct ID or the generated token of the user.
          example: "12345"
          type: string
        push:
          description:
            If you use multiple Push providers, add the following prefix for
            the respective provider tokens:<br/><br/>- <b>For Expo&#58;</b> `expo_token:`<your_pushtoken><br/>-
            <b>For FCM&#58;</b> `fcm_token:`<your_pushtoken><br/>- <b>For OneSignal playerId&#58;</b>
            `onesignal_player_id:`<enter_playerid><br/>- <b>For OneSignal externalId&#58;</b>
            `onesignal_external_id:`<enter_externalid><br/>- <b>For Mi Push&#58;</b> `mi_token:`<your_pushtoken><br/><br/>If
            you use just one provider, then the prefix is not required. However, if you
            wish to use OneSignal with playerId token, then the prefix is required.
          example: ExponentPushToken[XXXXX]
          type: string
        slack:
          description: Enter the channel ID, user ID, or email address of the user.
          example: CXXXXXXXXXX
          type: string
        sms:
          description:
            Enter the mobile number of the user. The number must start with
            the country code (preferably in E.164 format). For example&#58; +919879XXXXXX.
          example: +919879XXXXXX
          type: string
        teams:
          description:
            Enter the channel name. For teams, we currently support sending
            to one channel only. To send to multiple channels, do get in touch
            and we can share a workaround.
          example: General
          type: string
        voice:
          description:
            Enter the mobile number of the user. The number must start with
            the country code (preferably in E.164 format). For example&#58; +919879XXXXXX.
          example: +919879XXXXXX
          type: string
        whatsapp:
          description:
            Enter the WhatsApp mobile number of the user. The number must start
            with the country code (preferably in E.164 format). For example&#58; +919879XXXXXX
          example: +919879XXXXXX
          type: string
      type: object
