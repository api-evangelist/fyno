              - live
              - test
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/unset_user_property"
        required: true
      responses:
        "202":
          $ref: "#/components/responses/PropertyUpdateRequestAccepted"
        "400":
          $ref: "#/components/responses/EmptyUnsetObject"
        "401":
          $ref: "#/components/responses/APIKeyInvalid"
  /{WSID}/{version}/profiles/properties/batch:
    post:
      tags:
        - User Properties
      summary: "Batch Update User Properties"
      description: "This API enables you to modify user properties of your users listed in your [User Profiles](../user-profiles-overview) in bulk:<br/><ul><li>[Update User Properties](./update-user-property) - `$set`</li><li>[Set Unset Properties](./set-an-unset-property) - `$once`</li><li>[Increment/Decrement Numeric Properties](./increment-decrement-numeric-property) - `$add`</li><li>[Append Values to List](./append-values-to-list) - `$append`</li><li>[Remove Values From List](./remove-value-from-list) - `$remove`, and</li><li>[Unset User Properties](./unset-user-property) `$unset`</li></ul><strong>Please refer to function specific API documentation for [&#36;set](./update-user-property), [&#36;once](./set-an-unset-property), [&#36;add](./increment-decrement-numeric-property), [&#36;append](./append-values-to-list), [&#36;remove](./remove-value-from-list), [&#36;unset](./unset-user-property) before using this API.</strong><br/></br><br/>**Note:** The user properties in User Profiles can be used to filter your users for creating [user cohorts](../creating-cohorts) and [campaigns](../campaign_creation#creating-a-campaign-using-cohort)."
      parameters:
        - name: WSID
          in: path
          description: Enter your workspace ID. You can obtain this value from the API Keys page within your Fyno account.
          required: true
          style: simple
          explode: false
          schema:
            type: string
          example: FYXXXXXXXX
        - name: version
          in: path
          description: Specify the version for which you would like to update the user property.
          required: true
          style: simple
          explode: false
          schema:
            type: string
            default: live
            enum:
              - live
              - test
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/user_property_bulk"
      responses:
        "202":
          $ref: "#/components/responses/PropertyUpdateRequestAcceptedBulk"
        "400":
          $ref: "#/components/responses/EmptyActionBulkProperty"
        "401":
          $ref: "#/components/responses/APIKeyInvalid"
  /{WSID}/suppressions:
    get:
      tags:
        - Suppression List
      summary: "Get Suppression List"
      description: "The Suppression List API enables you to manage users who should be excluded from receiving communications on specific channels.<br/><br/>This API enables you to retrieve the list of all suppressed users across various channels."
      parameters:
        - name: WSID
          in: path
          description: Enter your workspace ID. You can obtain this value from the API Keys page within your Fyno account.
          required: true
          style: simple
          explode: false
          schema:
            type: string
          example: FYXXXXXXXX
      responses:
        "200":
          $ref: "#/components/responses/SuppressionListSuccess"
        "401":
          $ref: "#/components/responses/APIKeyInvalid"
    post:
      tags:
        - Suppression List
      summary: "Add User to Suppression List"
      description: "Add a user to the suppression list for a given channel.<br/><br/><strong>Note:</strong> If both `distinct_id` and `destination` are provided, `distinct_id` takes precedence, and `destination` is ignored."
      parameters:
        - name: WSID
          in: path
          description: Enter your workspace ID. You can obtain this value from the API Keys page within your Fyno account.
          required: true
          style: simple
          explode: false
          schema:
            type: string
          example: FYXXXXXXXX
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/add_suppression_list"
      responses:
        "200":
          $ref: "#/components/responses/SuppressionListUpdated"
        "400":
          $ref: "#/components/responses/SuppressionListError"
        "401":
          $ref: "#/components/responses/APIKeyInvalid"
    delete:
      tags:
        - Suppression List
      summary: "Delete User from Suppression List"
      description: "Delete a suppression entry using its `_id`, `distinct_id`, `destination`.<br/><br/><strong>Note:</strong> If all three values (`distinct_id`, `destination`, `_id`) are provided, `_id` takes precedence followed by `distinct_id`."
      parameters:
        - name: WSID
          in: path
          description: Enter your workspace ID. You can obtain this value from the API Keys page within your Fyno account.
          required: true
          style: simple
          explode: false
          schema:
            type: string
          example: FYXXXXXXXX
        - name: _id
          in: query
          description: Unique identifier of the suppression record to delete.
          required: false
          schema:
            type: string
          example: 68763be4b8cee01156d9fa8a
        - name: distinct_id
          in: query
          description: Unique identifier (used as an alternative to destination)
          required: false
          schema:
            type: string
          example: XXXX-XXX-XXXX
        - name: destination
          in: query
          description: Phone number or email of the suppressed user
          required: false
          schema:
            type: string
          example: 919XXXXXXXX
      responses:
        "200":
          $ref: "#/components/responses/SuppressionListDeleted"
        "400":
          $ref: "#/components/responses/SuppressionDeleteError"
        "401":
          $ref: "#/components/responses/APIKeyInvalid"
components:
  securitySchemes:
    BearerAuth:
      type: http
      description: Enter your API Key. If you don't have it already, you can create one from the API Keys page within your Fyno account
      scheme: bearer
      x-fern-bearer:
        name: apiKey
        env: FYNO_API_KEY
  responses:
    EventRequestAccepted:
      description: Request accepted successfully and it will be processed asynchronously.
      content:
        application/json:
          schema:
            properties:
              event:
                example: event_name
                type: string
              received_time:
                example: "2025-02-17T07:49:13.352Z"
                type: string
                format: date
              request_id:
                example: XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
                type: string
              response:
                "$ref": "#/components/schemas/inline_response_202_response"
            type: object
            required:
              - event
              - received_time
              - request_id
              - response
    BulkEventRequestAccepted:
      description: Request accepted successfully and it will be processed asynchronously.
      content:
        application/json:
          schema:
            properties:
              event:
                example: event_name
                type: string
              received_time:
                example: 1672991866453
                type: number
              request_id:
                example: XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
                type: string
              response:
                items:
                  "$ref": "#/components/schemas/inline_response_202_1_response"
                type: array
            type: object
    PropertyUpdateRequestAccepted:
      description: Request has been accepted and will be processed asynchronously.
      content:
        application/json:
          schema:
            properties:
              request_id:
                example: XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
                type: string
            type: object
            required:
              - request_id
    PropertyUpdateRequestAcceptedBulk:
      description: Request has been accepted and will be processed asynchronously.
      content:
        application/json:
          schema:
            properties:
              request_id:
                example: XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
                type: string
              batch:
                type: array
                items:
                  properties:
                    $set:
                      type: string
                      example: ok
                    $once:
                      type: string
                      example: ok
                    $add:
                      type: string
                      example: ok
                    $append:
                      type: string
                      example: ok
                    $remove:
                      type: string
                      example: ok
                    $unset:
                      type: string
                      example: ok
                  type: object
            type: object
            required:
              - request_id
              - batch
    ProfileCreatedSuccessfully:
      description: Profile created successfully
      content:
        application/json:
          schema:
            properties:
              _message:
                example: Profile created successfully
                type: string
              status:
                example: ok
                type: string
            type: object
            required:
              - _message
              - status
    ProfileFetched:
      description: Profile fetched successfully
      content:
        application/json:
          schema:
            properties:
              channel:
                "$ref": "#/components/schemas/inline_response_200_channel"
              country_code:
                description:
                  The country code of the user. This value is automatically determined
                  based on the number provided in the SMS channel of the profile. For a list
                  of possible values, please <a href="https://content.fyno.io/docs/files/country_code.json"
                  target="_blank">click here</a>.
                example: IN
                type: string
              created_at:
                description: The timestamp when the profile was created in ISO Date Time Format.
                example: "2023-04-21T06:34:01.386Z"
                type: string
              distinct_id:
                description: The distinct ID used to identify the user.
                example: XXXXXXXX
                type: string
              id_list:
                description: Other profile IDs previously linked to this profile.
                items:
                  example: 6442XXXXXXXXXXXXXXXXc684
                type: array
              name:
                description: The full name of the user.
                example: John Doe
                type: string
              profile_id:
                description: Unique profile ID within Fyno.
                example: 6442XXXXXXXXXXXXXXXXc685
                type: string
              status:
                description:
                  The status of the user. If `1`, the user is active and should receive
                  notifications. If `0`, the user in inactive and should not receive notifications.
                enum:
                  - 1
                  - 0
                example: 1
                type: integer
              timezone:
                description:
                  The timezone of the user. For a list of possible values, please
                  <a href="https://content.fyno.io/docs/files/timezones.json"
                  target="_blank">click here</a>.
                example: Asia/Kolkata
                type: string
              timezone_offset:
                description:
                  The timezone offset of the user. The value is automatically determined
                  based on the timezone provided for the user in the profile.
                example: "+05:30"
                type: string
              updated_at:
                description:
                  The timestamp when the profile was last updated in ISO Date Time
                  Format.
                example: "2023-04-21T08:42:30.235Z"
                type: string
              version:
                description: The version where the user profile is available.
                enum:
                  - live
                  - test
                example: test
                type: string
            type: object
            required:
              - distinct_id
              - country_code
              - timezone
              - timezone_offset
              - created_at
              - updated_at
              - channel
              - properties
              - status
              - id_list
              - profile_id
